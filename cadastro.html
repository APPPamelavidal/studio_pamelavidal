<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta — Studio</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast-container"></div>

<div class="container">
  <a href="index.html" class="btn-voltar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar
  </a>

  <h1 class="page-title">Criar Conta</h1>
  <p class="page-subtitle">Preencha os dados para se cadastrar</p>

  <div class="field">
    <label>Nome completo</label>
    <input type="text" id="nome" placeholder="Seu nome" autocomplete="name">
  </div>
  <div class="field">
    <label>Celular</label>
    <input type="tel" id="celular" placeholder="(51) 99999-9999" autocomplete="tel">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="Crie uma senha" autocomplete="new-password">
  </div>
  <div class="field">
    <label>Confirmar senha</label>
    <input type="password" id="confirmarSenha" placeholder="Repita a senha" autocomplete="new-password">
  </div>

  <button class="form-btn" onclick="cadastrar()">Criar minha conta</button>

  <div class="form-link">
    Já tem conta? <a href="login.html">Entrar</a>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
