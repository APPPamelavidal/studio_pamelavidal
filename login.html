<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Studio</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast-container"></div>

<div class="container">
  <a href="index.html" class="btn-voltar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar
  </a>

  <h1 class="page-title">Bem-vinda 🌸</h1>
  <p class="page-subtitle">Entre com seu celular e senha</p>

  <div class="field">
    <label>Celular</label>
    <input type="tel" id="loginCelular" placeholder="(51) 99999-9999" autocomplete="username">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="loginSenha" placeholder="••••••" autocomplete="current-password">
  </div>

  <button class="form-btn" onclick="login()">Entrar</button>

  <div class="form-link">
    Não tem conta? <a href="cadastro.html">Criar conta</a>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
